name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Check for workspace artifacts
        run: |
          UNTRACKED=$(git status --porcelain | grep "^??" | grep -vE "^\?\? (node_modules|dist)/" || true)
          if [ -n "$UNTRACKED" ]; then
            echo "❌ Tests or build left unexpected untracked files in the workspace:"
            echo "$UNTRACKED"
            echo ""
            echo "Ensure all temp files go to os.tmpdir(), not process.cwd(). Tests must clean up after themselves."
            exit 1
          fi
          echo "✅ Workspace is clean"
