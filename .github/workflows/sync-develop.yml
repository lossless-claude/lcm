name: Sync develop after release

on:
  push:
    branches:
      - main
    paths:
      - package.json

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: Open sync PR to develop
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check if develop already contains this commit
        id: check
        run: |
          git fetch origin develop main
          if git merge-base --is-ancestor HEAD origin/develop; then
            echo "already_synced=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_synced=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open and merge sync PR
        if: steps.check.outputs.already_synced == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -pe "require('./package.json').version")
          BRANCH="chore/sync-develop-v${VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Reuse existing remote branch if it already exists, otherwise create it
          if git ls-remote --exit-code --heads origin "$BRANCH" > /dev/null 2>&1; then
            git checkout "$BRANCH"
            git pull --ff-only origin "$BRANCH"
          else
            git checkout -b "$BRANCH"
          fi

          git push origin "$BRANCH"

          # Reuse existing open PR for this branch/base if present, otherwise create one
          PR_NUMBER=$(gh pr list \
            --repo "${{ github.repository }}" \
            --base develop \
            --head "$BRANCH" \
            --state open \
            --json number \
            --jq '.[0].number // empty')

          if [[ -z "$PR_NUMBER" ]]; then
            PR_URL=$(gh pr create \
              --repo "${{ github.repository }}" \
              --base develop \
              --head "$BRANCH" \
              --title "chore: sync develop with main after v${VERSION} release" \
              --body "Automated post-release sync: brings develop up to date with the v${VERSION} release commit on main.")
            PR_NUMBER="${PR_URL##*/}"
          fi

          if [[ -z "$PR_NUMBER" || ! "$PR_NUMBER" =~ ^[0-9]+$ ]]; then
            echo "ERROR: Failed to parse PR number (got: '$PR_NUMBER')" >&2
            exit 1
          fi

          gh pr merge "$PR_NUMBER" \
            --repo "${{ github.repository }}" \
            --merge \
            --delete-branch
